<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Request Quote | LibertyStack</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav><div class="container nav-container">
        <div class="logo"><a href="index.html">LIBERTYSTACK</a></div>
        <a href="index.html" style="color:#bbb; text-decoration:none;">← Home</a>
    </div></nav>

    <section class="section-bg sub-bg text-center">
        <div class="container"><h1>Get Your Proposal</h1><p>Start your journey with LibertyStack.</p></div>
    </section>

    <section style="padding: 80px 0;">
        <div class="container">
            <div class="form-container">
                <form action="#">
                    <div class="form-group"><label>Full Name</label><input type="text" placeholder="John Doe" required></div>
                    <div class="form-group"><label>Email Address</label><input type="email" placeholder="john@company.com" required></div>
                    <div class="form-group"><label>Service</label>
                        <select><option>Technical Development</option><option>Creative Production</option><option>Strategic Operations</option></select>
                    </div>
                    <div class="form-group"><label>Project Brief</label><textarea rows="6" placeholder="Describe your goals..."></textarea></div>
                    <button type="submit" class="btn-primary" style="width:100%;">Submit Request</button>
                </form>
            </div>
        </div>
    </section>
</body>
</html>
