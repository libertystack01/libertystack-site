<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Quote | LibertyStack</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="container nav-container">
            <div class="logo"><a href="index.html">LIBERTYSTACK</a></div>
        </div>
    </nav>

    <section class="section-bg tech-bg">
        <div class="container" style="text-align:center">
            <h1>Request a Quote</h1>
            <p>Start your journey with LibertyStack today.</p>
        </div>
    </section>

    <section style="padding: 100px 0">
        <div class="container">
            <div class="form-container">
                <form>
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" placeholder="john@example.com">
                    </div>
                    <div class="form-group">
                        <label>Interested Service</label>
                        <select>
                            <option>Technical Development</option>
                            <option>Creative Production</option>
                            <option>Strategic Operations</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-primary" style="width:100%">Submit Request</button>
                </form>
            </div>
        </div>
    </section>
</body>
</html>
