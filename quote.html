<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Request Quote | LibertyStack Solutions</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background: #f4f7f6;">
    <nav>
        <div class="container nav-container">
            <div class="logo"><a href="index.html">LIBERTYSTACK</a></div>
            <a href="index.html" style="color: #555; text-decoration: none; font-weight: bold;">← Back to Home</a>
        </div>
    </nav>

    <div class="container" style="padding: 80px 0;">
        <div style="max-width: 700px; margin: 0 auto; background: #fff; padding: 50px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #eee;">
            <h2 class="text-center" style="margin-bottom: 10px;">Request a Proposal</h2>
            <p class="text-center" style="color: #666; margin-bottom: 40px;">Let's discuss your project goals.</p>
            <form>
                <div style="margin-bottom: 25px;">
                    <label style="display: block; font-weight: bold; margin-bottom: 8px; font-size: 0.9rem; color: #1a1a1a;">Full Name</label>
                    <input type="text" placeholder="Your Name" style="width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 5px; background: #fdfdfd;">
                </div>
                <div style="margin-bottom: 25px;">
                    <label style="display: block; font-weight: bold; margin-bottom: 8px; font-size: 0.9rem; color: #1a1a1a;">Professional Email</label>
                    <input type="email" placeholder="name@company.com" style="width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 5px; background: #fdfdfd;">
                </div>
                <div style="margin-bottom: 25px;">
                    <label style="display: block; font-weight: bold; margin-bottom: 8px; font-size: 0.9rem; color: #1a1a1a;">Project Brief</label>
                    <textarea rows="6" placeholder="Describe your requirements in detail..." style="width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 5px; background: #fdfdfd;"></textarea>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; font-size: 1.1rem; padding: 18px;">Submit Request</button>
            </form>
        </div>
    </div>
</body>
</html>
