<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request a Quote | LibertyStack</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="container nav-container">
            <div class="logo"><a href="index.html">LIBERTYSTACK</a></div>
            <a href="index.html" style="color:#bbb; text-decoration:none;">← Back Home</a>
        </div>
    </nav>

    <header class="section-bg faq-bg text-center">
        <div class="container">
            <h1>Request a Quote</h1>
            <p>Tell us about your project, and our team will get back to you within 24 hours.</p>
        </div>
    </header>

    <section style="padding: 80px 0;">
        <div class="container">
            <div class="form-container">
                <form action="#">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" placeholder="Ex: John Doe" required>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" placeholder="john@company.com" required>
                    </div>
                    <div class="form-group">
                        <label>Interested Service</label>
                        <select>
                            <option>Technical Development</option>
                            <option>Creative Production</option>
                            <option>Strategic Operations</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Project Brief</label>
                        <textarea rows="6" placeholder="Describe your requirements..."></textarea>
                    </div>
                    <button type="submit" class="btn-primary" style="width:100%;">Submit Request</button>
                </form>
            </div>
        </div>
    </section>

    <footer class="text-center">
        <p>&copy; 2026 LibertyStack Solutions</p>
    </footer>
</body>
</html>
