<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request a Quote | LibertyStack Solutions</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="container nav-container">
            <div class="logo"><a href="index.html">LIBERTYSTACK</a></div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="development.html">Development</a></li>
            </ul>
        </div>
    </nav>

    <section class="faq-split">
        <div class="container text-center">
            <h1>Request a Quote</h1>
            <p>Tell us about your project, and we'll get back to you within 24 hours.</p>
        </div>
    </section>

    <section class="subpage-content">
        <div class="container">
            <div class="form-container">
                <form action="#" method="POST">
                    <label>Full Name</label>
                    <input type="text" placeholder="Ex: John Doe" required>
                    
                    <label>Email Address</label>
                    <input type="email" placeholder="john@company.com" required>
                    
                    <label>Interested Service</label>
                    <select>
                        <option>Technical Development</option>
                        <option>Creative Production</option>
                        <option>Strategic Operations</option>
                    </select>
                    
                    <label>Project Brief</label>
                    <textarea rows="5" placeholder="Describe your requirements..."></textarea>
                    
                    <button type="submit" class="btn-primary" style="width:100%">Submit Request</button>
                </form>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 LibertyStack Solutions. All Rights Reserved.</p>
    </footer>
</body>
</html>
